name: Trien khai Website tu dong
on: [push]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Lay code ve
        uses: actions/checkout@v4

      - name: Thiet lap GitHub Pages
        uses: actions/configure-pages@v4

      - name: Tai code len GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy (Trien khai) trang web
        uses: actions/deploy-pages@v4
